<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DOUBLEU | Carrello</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    :root {
      --wfox-navy:  #0D1B2A;
      --wfox-cream: #F5F0E8;
      --wfox-gold:  #C9A84C;
      --wfox-warm:  #FDFAF5;
      --wfox-mid:   #8B7355;
    }

    .promo-bar { background: var(--wfox-navy); color: var(--wfox-gold); text-align: center; padding: 10px 20px; font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase; }
    .promo-bar strong { color: var(--wfox-cream); }

    .cart-btn { position: relative; display: flex; align-items: center; gap: 6px; background: none; border: 1.5px solid var(--dw-bordeaux, #7A0F1B); padding: 8px 14px; cursor: pointer; color: var(--dw-bordeaux, #7A0F1B); text-decoration: none; font-size: 12px; letter-spacing: .04em; transition: background .2s, color .2s; }
    .cart-btn:hover { background: var(--dw-bordeaux, #7A0F1B); color: #fff; }
    .cart-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .cart-badge { position: absolute; top: -7px; right: -7px; background: var(--wfox-gold); color: var(--wfox-navy); font-size: 9px; font-weight: 700; width: 17px; height: 17px; border-radius: 50%; display: flex; align-items: center; justify-content: center; display: none; }

    /* CART PAGE */
    .cart-page { background: var(--wfox-warm); min-height: 80vh; padding: 48px 40px 80px; }
    .cart-page-inner { max-width: 1000px; margin: 0 auto; }
    .cart-page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 6vw, 72px); color: var(--wfox-navy); letter-spacing: .04em; margin-bottom: 40px; }

    /* TWO COLUMN: items + summary */
    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 48px; align-items: start; }

    /* ITEMS */
    .cart-items { border-top: 2px solid var(--wfox-navy); }
    .cart-item { display: grid; grid-template-columns: 80px 1fr auto; gap: 20px; padding: 24px 0; border-bottom: 1px solid rgba(13,27,42,.1); align-items: center; }
    .cart-item-img { width: 80px; height: 100px; object-fit: cover; object-position: top; background: rgba(13,27,42,.04); display: block; }
    .cart-item-img-placeholder { width: 80px; height: 100px; background: rgba(13,27,42,.05); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cart-item-img-placeholder svg { width: 28px; height: 28px; opacity: .2; }
    .cart-item-info { }
    .cart-item-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: .06em; color: var(--wfox-navy); margin-bottom: 4px; }
    .cart-item-meta { font-size: 11.5px; color: var(--wfox-mid); letter-spacing: .04em; margin-bottom: 12px; }
    .cart-item-qty { display: flex; align-items: center; gap: 0; border: 1.5px solid rgba(13,27,42,.18); width: fit-content; }
    .qty-btn { width: 44px; height: 44px; border: none; background: transparent; font-size: 16px; cursor: pointer; color: var(--wfox-navy); transition: background .15s; display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { background: rgba(13,27,42,.06); }
    .qty-val { width: 36px; text-align: center; font-size: 13px; color: var(--wfox-navy); font-weight: 500; border: none; outline: none; background: transparent; }
    .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 16px; }
    .cart-item-price { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--wfox-navy); }
    .cart-item-remove { background: none; border: none; cursor: pointer; color: rgba(13,27,42,.35); font-size: 18px; line-height: 1; padding: 4px; transition: color .15s; }
    .cart-item-remove:hover { color: var(--wfox-navy); }

    /* EMPTY STATE */
    .cart-empty { text-align: center; padding: 80px 40px; grid-column: 1/-1; }
    .cart-empty h2 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--wfox-navy); margin-bottom: 16px; }
    .cart-empty p { color: var(--wfox-mid); font-size: 15px; margin-bottom: 32px; }

    /* SUMMARY */
    .cart-summary { background: var(--wfox-navy); padding: 32px 28px; position: sticky; top: 100px; overflow: hidden; }
    .summary-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .08em; color: var(--wfox-cream); margin-bottom: 24px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: rgba(245,240,232,.6); margin-bottom: 12px; }
    .summary-row.shipping { font-size: 12px; }
    .summary-divider { border: none; border-top: 1px solid rgba(245,240,232,.1); margin: 20px 0; }
    .summary-total { display: flex; justify-content: space-between; font-size: 18px; color: var(--wfox-cream); font-weight: 500; margin-bottom: 8px; }
    .summary-tax { font-size: 11px; color: rgba(245,240,232,.35); text-align: right; margin-bottom: 24px; }
    .promo-input-row { display: flex; gap: 0; margin-bottom: 20px; width: 100%; }
    .promo-input { flex: 1; min-width: 0; padding: 11px 14px; background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.12); color: var(--wfox-cream); font-size: 16px; letter-spacing: .08em; text-transform: uppercase; outline: none; }
    .promo-input::placeholder { color: rgba(245,240,232,.3); }
    .promo-input:focus { border-color: var(--wfox-gold); }
    .promo-apply { flex-shrink: 0; background: var(--wfox-gold); border: none; color: var(--wfox-navy); padding: 11px 18px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .promo-apply:hover { opacity: .85; }
    .promo-ok { font-size: 11px; color: var(--wfox-gold); letter-spacing: .08em; margin-bottom: 16px; display: none; }
    .btn-checkout { display: block; width: 100%; background: var(--wfox-gold); border: none; color: var(--wfox-navy); padding: 18px; font-size: 11px; letter-spacing: .25em; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: opacity .2s; text-align: center; text-decoration: none; }
    .btn-checkout:hover { opacity: .9; }
    .btn-checkout:disabled { opacity: .4; cursor: not-allowed; }
    .secure-note { text-align: center; font-size: 10px; color: rgba(245,240,232,.3); letter-spacing: .08em; margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .secure-note svg { width: 12px; }

    @media (max-width: 860px) {
      .cart-page { padding: 32px 20px 60px; }
      .cart-layout { grid-template-columns: 1fr; }
      .cart-summary { position: static; }
    }
  </style>
</head>
<body>

  <div class="promo-bar">
    <span data-i18n="shop.promo"></span>
  </div>

  <header class="topbar">
    <div class="container">
      <div class="header-top">
        <a class="brand" href="index.html">
          <span class="brand-name">DOUBLEU</span>
          <span class="brand-sub">Tennis Apparel</span>
        </a>
        <button class="mobile-toggle" aria-expanded="false" aria-label="Apri menu">&#9776;</button>
        <nav class="header-nav" id="main-nav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="club.html">Per i Club</a></li>
            <li><a class="active" href="capsule.html">Capsule</a></li>
            <li><a href="casestudies.html">Case Studies</a></li>
            <li><a href="lookbook.html">Lookbook</a></li>
            <li><a href="contatti.html">Contatti</a></li>
          </ul>
        </nav>
        <div class="header-actions">
          <a class="cart-btn" href="carrello.html" aria-label="Carrello">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/></svg>
            Carrello
            <span class="cart-badge">0</span>
          </a>
        </div>
      </div>
      <div class="header-lang"><a href="#" data-lang="it">IT</a> | <a href="#" data-lang="en">EN</a> | <a href="#" data-lang="de">DE</a></div>
    </div>
  </header>

  <main>
    <div class="cart-page">
      <div class="cart-page-inner">
        <h1 class="cart-page-title" id="cart-page-title"></h1>
        <div class="cart-layout" id="cart-layout">
          <!-- filled by JS -->
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-row">
      <div>
        <a class="brand" href="index.html" style="display:flex;flex-direction:column;gap:2px;">
          <span style="font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;letter-spacing:2px;">DOUBLEU</span>
          <span style="font-size:8px;letter-spacing:3px;color:#6a8090;text-transform:uppercase;">Tennis Apparel</span>
        </a>
      </div>
      <div class="footer-links">
        <a href="privacy.html">Privacy</a>
        <a href="termini.html">Termini e condizioni</a>
        <a href="spedizioni.html">Reso e Spedizioni</a>
        <a href="pagamenti.html">Pagamenti</a>
      </div>
      <div class="header-lang"><a href="#" data-lang="it">IT</a> | <a href="#" data-lang="en">EN</a> | <a href="#" data-lang="de">DE</a></div>
    </div>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    const SHIPPING_COST = 9.90;
    const FREE_SHIPPING_THRESHOLD = 89;
    const PROMO_CODE = 'DELY26';

    let promoApplied = false;

    function formatPrice(n) {
      return n.toFixed(2).replace('.', ',') + ' €';
    }

    function renderCart() {
      const items    = Cart.getAll();
      const layout   = document.getElementById('cart-layout');
      const subtotal = Cart.subtotal();
      const shipping = (promoApplied && subtotal >= FREE_SHIPPING_THRESHOLD) ? 0 : SHIPPING_COST;
      const total    = subtotal + shipping;

      if (!items.length) {
        layout.innerHTML = `
          <div class="cart-empty">
            <h2>${t('shop.cart.empty.title', getLang())}</h2>
            <p>${t('shop.cart.empty.desc', getLang())}</p>
            <a href="capsule.html" class="btn primary">${t('shop.cart.empty.cta', getLang())}</a>
          </div>`;
        return;
      }

      const itemsHtml = items.map((item, idx) => `
        <div class="cart-item" data-idx="${idx}">
          ${item.image
            ? `<img class="cart-item-img" src="${item.image}" alt="${item.name}">`
            : `<div class="cart-item-img-placeholder"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>`
          }
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-meta">${t('shop.cart.item.color', getLang())}: ${item.color} &nbsp;·&nbsp; ${t('shop.cart.item.size', getLang())}: ${item.size}</div>
            <div class="cart-item-qty">
              <button class="qty-btn" data-action="dec" data-idx="${idx}">−</button>
              <input class="qty-val" type="number" min="1" max="10" value="${item.qty}" data-idx="${idx}" readonly>
              <button class="qty-btn" data-action="inc" data-idx="${idx}">+</button>
            </div>
          </div>
          <div class="cart-item-right">
            <button class="cart-item-remove" data-idx="${idx}" aria-label="Rimuovi">✕</button>
            <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
          </div>
        </div>`).join('');

      const shippingLabel = shipping === 0
        ? `<span style="color:#C9A84C">${t('shop.cart.shipping.free', getLang())}</span>`
        : formatPrice(SHIPPING_COST);

      const promoHint = !promoApplied
        ? `<p style="font-size:11px;color:rgba(245,240,232,.38);letter-spacing:.06em;margin-bottom:8px">
             ${t('shop.cart.promo.hint', getLang()).replace('{threshold}', FREE_SHIPPING_THRESHOLD)}
           </p>`
        : '';

      layout.innerHTML = `
        <div class="cart-items">${itemsHtml}</div>
        <div class="cart-summary">
          <div class="summary-title">${t('shop.cart.summary', getLang())}</div>
          <div class="summary-row"><span>${t('shop.cart.subtotal', getLang())}</span><span>${formatPrice(subtotal)}</span></div>
          <div class="summary-row shipping"><span>${t('shop.cart.shipping', getLang())}</span><span>${shippingLabel}</span></div>
          ${promoHint}
          <div class="promo-input-row">
            <input class="promo-input" id="promo-input" type="text" placeholder="${t('shop.cart.promo.placeholder', getLang())}" maxlength="20" value="${promoApplied ? PROMO_CODE : ''}">
            <button class="promo-apply" id="promo-btn">${promoApplied ? t('shop.cart.promo.applied', getLang()) : t('shop.cart.promo.apply', getLang())}</button>
          </div>
          <div class="promo-ok" id="promo-ok">${t('shop.cart.promo.ok', getLang())}</div>
          <hr class="summary-divider">
          <div class="summary-total"><span>${t('shop.cart.total', getLang())}</span><span>${formatPrice(total)}</span></div>
          <div class="summary-tax">${t('shop.cart.tax', getLang())}</div>
          <a class="btn-checkout" href="checkout.html${promoApplied ? '?promo=1' : ''}">${t('shop.cart.checkout', getLang())}</a>
          <div class="secure-note">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.955 11.955 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
            ${t('shop.cart.secure', getLang())}
          </div>
        </div>`;

      // Bind events
      layout.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx  = +btn.dataset.idx;
          const item = Cart.getAll()[idx];
          Cart.updateQty(idx, item.qty + (btn.dataset.action === 'inc' ? 1 : -1));
          renderCart();
        });
      });

      layout.querySelectorAll('.cart-item-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          Cart.remove(+btn.dataset.idx);
          renderCart();
        });
      });

      const promoBtn   = document.getElementById('promo-btn');
      const promoInput = document.getElementById('promo-input');
      const promoOk    = document.getElementById('promo-ok');
      if (promoApplied && promoOk) promoOk.style.display = 'block';

      if (promoBtn) {
        promoBtn.addEventListener('click', () => {
          if (promoApplied) return;
          if (promoInput.value.trim().toUpperCase() === PROMO_CODE) {
            promoApplied = true;
            renderCart();
          } else {
            promoInput.style.borderColor = '#c0392b';
            setTimeout(() => { promoInput.style.borderColor = ''; }, 1500);
          }
        });
      }
    }

    renderCart();
    document.getElementById('cart-page-title').textContent = t('shop.cart.title', getLang());
    if (typeof applyTranslations === 'function') applyTranslations(getLang());

    document.querySelectorAll('[data-lang]').forEach(el => {
      el.addEventListener('click', () => {
        document.getElementById('cart-page-title').textContent = t('shop.cart.title', el.getAttribute('data-lang'));
        renderCart();
        if (typeof applyTranslations === 'function') applyTranslations(el.getAttribute('data-lang'));
      });
    });
  </script>
</body>
</html>
