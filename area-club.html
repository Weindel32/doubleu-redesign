<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DOUBLEU | Area Riservata Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=20260616" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #F5F2ED; font-family: 'Montserrat', sans-serif; }

    .cl-wrap { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }

    /* LEFT PANEL */
    .cl-left {
      background: #0D1B2A;
      display: flex; flex-direction: column;
      padding: 48px 56px;
      position: relative; overflow: hidden;
    }
    .cl-left::before {
      content: 'DOUBLEU';
      position: absolute; bottom: -40px; left: -20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22vw; font-weight: 300;
      color: rgba(255,255,255,.03); white-space: nowrap;
      pointer-events: none; line-height: 1;
    }
    .cl-left-logo { display: flex; flex-direction: column; gap: 3px; text-decoration: none; }
    .cl-left-logo span { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; letter-spacing: .12em; color: #F5F0E8; }
    .cl-left-logo small { font-size: 8px; letter-spacing: .35em; text-transform: uppercase; color: rgba(245,240,232,.32); }
    .cl-left-body { flex: 1; display: flex; align-items: flex-end; }
    .cl-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 3.8vw, 52px);
      font-weight: 300; font-style: italic;
      color: rgba(245,240,232,.72);
      line-height: 1.2;
      padding-bottom: 56px;
    }

    /* RIGHT PANEL */
    .cl-right {
      display: flex; align-items: center; justify-content: center;
      padding: 48px 40px;
      background: #F5F2ED;
    }
    .cl-form-wrap { width: 100%; max-width: 400px; }

    .cl-badge {
      display: inline-block;
      font-size: 9px; font-weight: 500; letter-spacing: .32em; text-transform: uppercase;
      color: #0D1B2A; border: 1px solid rgba(13,27,42,.25);
      padding: 6px 14px; margin-bottom: 28px;
    }
    .cl-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 300; color: #0D1B2A;
      margin-bottom: 32px; line-height: 1.1;
    }

    /* TABS */
    .cl-tabs { display: flex; gap: 0; border-bottom: 1.5px solid rgba(13,27,42,.12); margin-bottom: 28px; }
    .cl-tab {
      flex: 1; background: none; border: none; padding: 12px 0;
      font-size: 11px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase;
      cursor: pointer; color: rgba(13,27,42,.38); position: relative;
      transition: color .2s;
    }
    .cl-tab::after {
      content: ''; position: absolute; bottom: -1.5px; left: 0; right: 0;
      height: 2px; background: #0D1B2A; transform: scaleX(0);
      transition: transform .25s;
    }
    .cl-tab.active { color: #0D1B2A; }
    .cl-tab.active::after { transform: scaleX(1); }

    /* FORM */
    .cl-field { margin-bottom: 18px; }
    .cl-label { display: block; font-size: 10px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: rgba(13,27,42,.52); margin-bottom: 7px; }
    .cl-input {
      width: 100%; padding: 13px 16px;
      background: #fff; border: 1.5px solid rgba(13,27,42,.14);
      font-size: 16px; font-family: 'Montserrat', sans-serif;
      color: #0D1B2A; outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    .cl-input:focus { border-color: #0D1B2A; }
    .cl-input::placeholder { color: rgba(13,27,42,.28); }

    .cl-error { font-size: 12px; color: #C0392B; margin-bottom: 14px; min-height: 18px; }
    .cl-success { font-size: 12px; color: #1B3A2D; background: rgba(27,58,45,.07); padding: 10px 14px; margin-bottom: 14px; line-height: 1.5; }

    .cl-submit {
      width: 100%; padding: 16px;
      background: #0D1B2A; border: none; color: #F5F0E8;
      font-size: 10.5px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, opacity .2s;
      font-family: 'Montserrat', sans-serif;
    }
    .cl-submit:hover { background: #1A2F44; }
    .cl-submit:disabled { opacity: .4; cursor: not-allowed; }

    .cl-lang { text-align: center; margin-top: 32px; }
    .cl-back-site { display: inline-block; margin-top: 16px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(245,240,232,.35); text-decoration: none; transition: color .2s; }
    .cl-back-site:hover { color: rgba(245,240,232,.7); }
    .cl-lang a { font-size: 11px; letter-spacing: .08em; color: rgba(13,27,42,.38); text-decoration: none; margin: 0 5px; transition: color .2s; }
    .cl-lang a:hover, .cl-lang a.active { color: #0D1B2A; }

    /* GOOGLE BUTTON */
    .cl-google-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 13px 16px; background: #fff; border: 1.5px solid rgba(13,27,42,.18);
      font-size: 13px; font-family: 'Montserrat', sans-serif; font-weight: 500;
      color: #0D1B2A; cursor: pointer; transition: border-color .2s, box-shadow .2s;
      margin-bottom: 20px;
    }
    .cl-google-btn:hover { border-color: #0D1B2A; box-shadow: 0 2px 8px rgba(13,27,42,.08); }
    .cl-google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .cl-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .cl-divider::before, .cl-divider::after { content: ''; flex: 1; height: 1px; background: rgba(13,27,42,.12); }
    .cl-divider span { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: rgba(13,27,42,.35); }

    /* MOBILE */
    @media (max-width: 720px) {
      .cl-wrap { grid-template-columns: 1fr; }
      .cl-left { min-height: 180px; padding: 32px 28px; }
      .cl-left::before { font-size: 40vw; }
      .cl-left-body { display: none; }
      .cl-right { padding: 40px 24px; }
      .cl-form-wrap { max-width: 100%; }
    }

    /* FOOTER LEGAL */
    .cl-footer-legal { background: #0A1520; padding: 14px 40px; display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; }
    .cl-footer-legal a { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: rgba(245,240,232,.18); text-decoration: none; transition: color .2s; }
    .cl-footer-legal a:hover { color: rgba(245,240,232,.5); }
    @media (max-width: 720px) { .cl-footer-legal { display: none; } }

    /* LANG ACTIVE */
    .cl-lang a.lang-active { color: #0D1B2A; font-weight: 600; }
  </style>
</head>
<body>

<div class="cl-wrap">

  <!-- LEFT: brand panel -->
  <div class="cl-left">
    <a href="index.html" class="cl-left-logo">
      <span>DOUBLEU</span>
      <small>Tennis Apparel</small>
    </a>
    <a href="index.html" class="cl-back-site" data-i18n="club.area.back.site">← Torna al sito</a>
    <div class="cl-left-body">
      <p class="cl-tagline" data-i18n="club.area.tagline">L'area riservata<br>del tuo club.</p>
    </div>
  </div>

  <!-- RIGHT: form -->
  <div class="cl-right">
    <div class="cl-form-wrap" id="cl-form-wrap">

      <div class="cl-badge" id="cl-badge">Club</div>
      <h1 class="cl-title" data-i18n="club.area.title">Area Riservata</h1>

      <!-- Google Sign-in -->
      <button class="cl-google-btn" id="google-btn" type="button">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span data-i18n="club.area.google">Accedi con Google</span>
      </button>

      <div class="cl-divider"><span data-i18n="club.area.or">oppure</span></div>

      <div class="cl-tabs">
        <button class="cl-tab active" id="tab-login" data-i18n="club.area.tab.login">Accedi</button>
        <button class="cl-tab" id="tab-register" data-i18n="club.area.tab.register">Registrati</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="form-login">
        <div class="cl-field">
          <label class="cl-label" for="login-email" data-i18n="club.area.form.email">Email</label>
          <input type="email" id="login-email" class="cl-input" required autocomplete="email" placeholder="email@club.it">
        </div>
        <div class="cl-field">
          <label class="cl-label" for="login-password" data-i18n="club.area.form.password">Password</label>
          <input type="password" id="login-password" class="cl-input" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <div class="cl-error" id="login-error"></div>
        <button type="submit" class="cl-submit" id="login-btn">
          <span data-i18n="club.area.login.submit">Accedi</span>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="form-register" style="display:none">
        <div class="cl-field">
          <label class="cl-label" for="reg-email" data-i18n="club.area.form.email">Email</label>
          <input type="email" id="reg-email" class="cl-input" required autocomplete="email" placeholder="email@club.it">
        </div>
        <div class="cl-field">
          <label class="cl-label" for="reg-password" data-i18n="club.area.form.password">Password</label>
          <input type="password" id="reg-password" class="cl-input" required autocomplete="new-password" placeholder="••••••••" minlength="6">
        </div>
        <div class="cl-field">
          <label class="cl-label" for="reg-confirm" data-i18n="club.area.form.confirmPassword">Conferma password</label>
          <input type="password" id="reg-confirm" class="cl-input" required autocomplete="new-password" placeholder="••••••••">
        </div>
        <div class="cl-error" id="reg-error"></div>
        <div class="cl-success" id="reg-success" style="display:none"></div>
        <button type="submit" class="cl-submit" id="reg-btn">
          <span data-i18n="club.area.register.submit">Crea account</span>
        </button>
      </form>

      <div class="cl-lang">
        <a href="#" data-lang="it">IT</a> |
        <a href="#" data-lang="en">EN</a> |
        <a href="#" data-lang="de">DE</a>
      </div>

    </div>
  </div>

</div>

<!-- FOOTER LEGAL -->
<div class="cl-footer-legal">
  <a href="privacy.html" data-i18n="footer.privacy">Privacy</a>
  <a href="termini.html" data-i18n="footer.terms">Termini e condizioni</a>
  <a href="cookie.html" data-i18n="footer.cookie">Cookie Policy</a>
  <a href="spedizioni.html" data-i18n="footer.shipping">Reso e Spedizioni</a>
  <a href="pagamenti.html" data-i18n="footer.payments">Pagamenti</a>
  <a href="garment-care.html" data-i18n="footer.care">Garment Care</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="assets/js/i18n.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyAw72PJD8t1S8CmZujln-n3UL-yoXknZLo",
    authDomain:        "doubleu---area---club.firebaseapp.com",
    projectId:         "doubleu---area---club",
    storageBucket:     "doubleu---area---club.firebasestorage.app",
    messagingSenderId: "345970183746",
    appId:             "1:345970183746:web:9f10caf5bc96810243e7db"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ── Detect club from URL (?club=mtc | ?club=allround)
  const params   = new URLSearchParams(location.search);
  const clubId   = (params.get('club') || '').toLowerCase();
  const clubSuffix = clubId ? `?club=${clubId}` : '';
  const CLUB_NAMES = { mtc: 'MTC Ausstellungspark', allround: 'All Round Sport & Wellness' };
  const clubName = CLUB_NAMES[clubId] || '';
  document.title = `DOUBLEU | Area Riservata Club`;

  // ── No club context → show neutral message, hide form
  if (!clubId || !CLUB_NAMES[clubId]) {
    const lang = typeof getLang === 'function' ? getLang() : 'it';
    const tr   = (key) => typeof t === 'function' ? t(key, lang) : key;
    document.getElementById('cl-badge').style.display = 'none';
    document.getElementById('cl-form-wrap').innerHTML = `
      <p style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#0D1B2A;line-height:1.3;margin-bottom:20px;">${tr('club.area.noclub.title')}</p>
      <p style="font-size:13px;color:rgba(13,27,42,.55);line-height:1.7;margin-bottom:32px;">${tr('club.area.noclub.message')}</p>
      <a href="index.html" style="display:inline-block;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:#0D1B2A;text-decoration:none;border-bottom:1px solid rgba(13,27,42,.25);padding-bottom:3px;">${tr('club.area.noclub.back')}</a>
    `;
  } else {
    document.getElementById('cl-badge').textContent = clubName;
    document.title = `DOUBLEU | Area ${clubName}`;

    // ── If already logged in → go directly to catalog
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = `area-club-catalogo.html${clubSuffix}`;
    });

    // ── Google Sign-in (popup)
    document.getElementById('google-btn').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      try {
        await auth.signInWithPopup(provider);
        if (window.DWAnalytics) DWAnalytics.track('login', { method: 'google' });
      } catch (err) {
        console.error('Google auth error:', err.code, err.message);
        if (err.code === 'auth/unauthorized-domain') {
          errEl.textContent = 'Dominio non autorizzato su Firebase.';
        } else if (err.code !== 'auth/popup-closed-by-user') {
          errEl.textContent = err.message || t('club.area.error.generic', getLang());
        }
      }
    });

    // ── Tab switching
    const tabLogin    = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const fLogin      = document.getElementById('form-login');
    const fRegister   = document.getElementById('form-register');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      fLogin.style.display = '';
      fRegister.style.display = 'none';
    });
    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      fRegister.style.display = '';
      fLogin.style.display = 'none';
    });

    // ── Login email/password
    fLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      btn.disabled = true;
      try {
        await auth.signInWithEmailAndPassword(
          document.getElementById('login-email').value.trim(),
          document.getElementById('login-password').value
        );
        if (window.DWAnalytics) DWAnalytics.track('login', { method: 'password' });
      } catch (err) {
        errEl.textContent = t('club.area.error.invalid', getLang());
        btn.disabled = false;
      }
    });

    // ── Register email/password
    fRegister.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('reg-btn');
      const errEl = document.getElementById('reg-error');
      const okEl  = document.getElementById('reg-success');
      errEl.textContent = '';
      okEl.style.display = 'none';

      const email   = document.getElementById('reg-email').value.trim();
      const pw      = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (pw !== confirm) {
        errEl.textContent = t('club.area.error.mismatch', getLang());
        return;
      }

      btn.disabled = true;
      try {
        await auth.createUserWithEmailAndPassword(email, pw);
      } catch (err) {
        const isExisting = err.code === 'auth/email-already-in-use';
        errEl.textContent = isExisting
          ? t('club.area.error.exists', getLang())
          : t('club.area.error.generic', getLang());
        btn.disabled = false;
      }
    });

    if (typeof applyTranslations === 'function') applyTranslations(getLang());
  }
</script>
    <!-- Analytics & Cookie Consent -->
    <script src="assets/js/analytics.js"></script>
    <!-- Vercel Web Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
